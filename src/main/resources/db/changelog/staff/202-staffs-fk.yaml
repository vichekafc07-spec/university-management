databaseChangeLog:
  - changeSet:
      id: 202-staffs-constraints-and-foreign-keys
      author: sorl vichika
      created: 28-03-2026
      changes:
        - addUniqueConstraint:
            tableName: staffs
            columnNames: staff_code
            constraintName: uk_staffs_staff_code

        - addUniqueConstraint:
            tableName: staffs
            columnNames: personal_email
            constraintName: uk_staffs_personal_email

        - addUniqueConstraint:
            tableName: staffs
            columnNames: user_id
            constraintName: uk_staffs_user_id

        - addForeignKeyConstraint:
            baseTableName: staffs
            baseColumnNames: faculty_id
            referencedTableName: faculties
            referencedColumnNames: id
            constraintName: fk_staffs_faculty

        - addForeignKeyConstraint:
            baseTableName: staffs
            baseColumnNames: department_id
            referencedTableName: departments
            referencedColumnNames: id
            constraintName: fk_staffs_department

        - addForeignKeyConstraint:
            baseTableName: staffs
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_staffs_user