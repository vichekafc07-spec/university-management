databaseChangeLog:
  - changeSet:
      id: 306-create-rooms-table
      author: sorl vichika
      created: 06-04-2026
      changes:
        - createTable:
            tableName: rooms
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: name
                  type: varchar(255)

              - column:
                  name: capacity
                  type: int

              - column:
                  name: building
                  type: varchar(100)

              - column:
                  name: created_at
                  type: TIMESTAMP

              - column:
                  name: updated_at
                  type: TIMESTAMP

              - column:
                  name: created_by
                  type: VARCHAR(100)

              - column:
                  name: updated_by
                  type: VARCHAR(100)

              - column:
                  name: deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

              - column:
                  name: deleted_at
                  type: TIMESTAMP