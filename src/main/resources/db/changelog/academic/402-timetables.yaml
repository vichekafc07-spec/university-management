databaseChangeLog:
  - changeSet:
      id: 402-create-timetables-table
      author: sorl vichika
      created: 14-04-2026
      changes:
        - createTable:
            tableName: timetables
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: term_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: classroom_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: subject_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: lecturer_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: room_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: day_of_week
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

              - column:
                  name: start_time
                  type: TIME
                  constraints:
                    nullable: false

              - column:
                  name: end_time
                  type: TIME
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: timetables
            baseColumnNames: term_id
            referencedTableName: academic_terms
            referencedColumnNames: id
            constraintName: fk_timetable_term

        - addForeignKeyConstraint:
            baseTableName: timetables
            baseColumnNames: classroom_id
            referencedTableName: classrooms
            referencedColumnNames: id
            constraintName: fk_timetable_classroom

        - addForeignKeyConstraint:
            baseTableName: timetables
            baseColumnNames: subject_id
            referencedTableName: subjects
            referencedColumnNames: id
            constraintName: fk_timetable_subject

        - addForeignKeyConstraint:
            baseTableName: timetables
            baseColumnNames: lecturer_id
            referencedTableName: staffs
            referencedColumnNames: id
            constraintName: fk_timetable_lecturer

        - addForeignKeyConstraint:
            baseTableName: timetables
            baseColumnNames: room_id
            referencedTableName: rooms
            referencedColumnNames: id
            constraintName: fk_timetable_room

        - addUniqueConstraint:
            tableName: timetables
            columnNames: term_id, classroom_id, subject_id, day_of_week, start_time
            constraintName: uk_timetables_slot

        - addUniqueConstraint:
            tableName: timetables
            columnNames: term_id, room_id, day_of_week, start_time
            constraintName: uk_timetables_room_slot

        - addUniqueConstraint:
            tableName: timetables
            columnNames: term_id, lecturer_id, day_of_week, start_time
            constraintName: uk_timetables_lecturer_slot

        - createIndex:
            tableName: timetables
            indexName: idx_timetables_term
            columns:
              - column:
                  name: term_id

        - createIndex:
            tableName: timetables
            indexName: idx_timetables_classroom
            columns:
              - column:
                  name: classroom_id

        - createIndex:
            tableName: timetables
            indexName: idx_timetables_lecturer
            columns:
              - column:
                  name: lecturer_id

        - createIndex:
            tableName: timetables
            indexName: idx_timetables_room
            columns:
              - column:
                  name: room_id
