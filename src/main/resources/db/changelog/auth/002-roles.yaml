databaseChangeLog:
  - changeSet:
      id: 002-create-roles-table
      author: vichika
      created: 21-03-2026
      changes:
        - createTable:
            tableName: roles
            columns:
              - column:
                  name: id
                  type: INT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)

        - addUniqueConstraint:
            tableName: roles
            columnNames: name
            constraintName: uk_roles_name