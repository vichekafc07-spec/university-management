databaseChangeLog:
  - changeSet:
      id: 001-create-users-table
      author: vichika
      created: 21-03-2026
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: username
                  type: VARCHAR(100)

              - column:
                  name: email
                  type: VARCHAR(150)

              - column:
                  name: password
                  type: VARCHAR(255)

              - column:
                  name: created_at
                  type: TIMESTAMP

              - column:
                  name: updated_at
                  type: TIMESTAMP

              - column:
                  name: created_by
                  type: BIGINT

              - column:
                  name: updated_by
                  type: BIGINT

        - addUniqueConstraint:
            tableName: users
            columnNames: email
            constraintName: uk_users_email

        - addUniqueConstraint:
            tableName: users
            columnNames: username
            constraintName: uk_users_username