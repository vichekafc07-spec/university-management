spring:
  application:
    name: StudentSystem
  datasource:
    url: ${DB_URL}
    username: ${DB_NAME}
    password: ${DB_PASS}
  jwt:
    secretKey: ${JWT_SECRET}
    accessExpiration: ${ACCESS_EXPIRATION}
    refreshExpiration: ${REFRESH_EXPIRATION}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
