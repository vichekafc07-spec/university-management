spring:
  application:
    name: StudentSystem
  datasource:
    url: ${DB_URL}
    username: ${DB_NAME}
    password: ${DB_PASS}

  jwt:
    secretKey: ${JWT_SECRET}
    accessExpiration: ${ACCESS_EXPIRATION}
    refreshExpiration: ${REFRESH_EXPIRATION}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  web:
    resources:
      static-locations: file:uploads/

  mail:
    host: smtp.gmail.com
    port: 587
    username: vichekafc07@gmail.com
    password: ${MAIL_PASS}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
